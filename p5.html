<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Course Feedback Form</h1>
    <form action="https://bhoomojini.karnataka.gov.in/">
        <div>
        <label for="course" name="name">Course Name</label>
        <select name="" id="">
            <option value="python">Python</option>
            <option value="javascript">JavaScript</option>
            <option value="fullstack">Fullstack</option>
        </select>
        
        </div>
        <hr>
        <div>
        <label for="instructor">Instructor Name</label>
        <select name="" id="">
            <option value="Saurabh">Saurabh</option>
            <option value="Saurabh">Manoj</option>
            <option value="Saurabh">Sachin</option>
        </select>
        </div>
        <hr>
        <div>
            <label for="rating">Rating</label>
            <input type="number" id="rating" name="rating" min="1" max="5" required>
            
            
            
        </div>
        <hr>
        <div>
            <label for="feedback">Comments</label>
            <textarea name="" id="" cols="50" rows="10"></textarea>
            <input type="reset" value="Reset">
        </div>
        <hr>
        <br>
            <input type="submit" value="submit">
        <br>
            
       
    </form>
</body>
</html>
